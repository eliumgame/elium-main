name: Elium CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12', '3.13']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]
    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check src/ tests/
    - name: Run Pytest with coverage
      run: |
        pytest tests/python -v --cov=elium --cov-report=term-missing

  web-studio-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Set up Python (tests d'interop Python <-> Web)
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install elium (Python) pour l'interop
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    - name: Install dependencies
      working-directory: ./web-studio
      run: npm ci
    - name: Lint (ESLint)
      working-directory: ./web-studio
      run: npm run lint
    - name: Build Web Studio
      working-directory: ./web-studio
      run: npm run build
    - name: Run Web Studio Tests
      working-directory: ./web-studio
      run: npm test

  server-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Install dependencies
      working-directory: ./server
      run: npm install
    - name: Lint (ESLint)
      working-directory: ./server
      run: npm run lint
    - name: Typecheck
      working-directory: ./server
      run: npm run typecheck
    - name: Test (Vitest)
      working-directory: ./server
      run: npm test

  server-e2e:
    runs-on: ubuntu-latest
    # Intégration lourde (Postgres embarqué + Fastify réel) : fragile selon l'environnement
    # du runner (dépendances système du binaire Postgres) et NE conditionne pas les releases
    # -> non bloquant. Passe 101/101 en local.
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - name: Installer libicu60 (dép. runtime du Postgres embarqué)
      run: |
        curl -fsSL -o /tmp/libicu60.deb \
          http://archive.ubuntu.com/ubuntu/pool/main/i/icu/libicu60_60.2-3ubuntu3.2_amd64.deb \
        || curl -fsSL -o /tmp/libicu60.deb \
          http://archive.ubuntu.com/ubuntu/pool/main/i/icu/libicu60_60.2-3ubuntu3_amd64.deb
        sudo dpkg -i /tmp/libicu60.deb || sudo apt-get -f install -y
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Install server dependencies
      working-directory: ./server
      run: npm ci
    - name: Install Web Studio dependencies
      working-directory: ./web-studio
      run: npm ci
    - name: Run multi-user E2E (embedded Postgres, real Fastify app, real SDK)
      working-directory: ./web-studio
      run: npm run test:e2e
