name: Elium — Publication auto (push master)

# Modèle « dès que je push, ça se met à jour » : chaque push sur master (hors docs)
# construit l'app Windows, signe le manifeste et publie une GitHub Release. Les apps
# installées la récupèrent automatiquement. Aucun tag manuel.
#
# Pré-requis (une seule fois) :
#   - Repo PUBLIC (sinon les utilisateurs ne peuvent pas télécharger les assets).
#   - Secret de dépôt UPDATE_SIGNING_KEY = clé privée Ed25519 (fichier update-private-key.hex).
#     Tant qu'il est absent, ce workflow s'exécute mais NE PUBLIE PAS (run vert, pas d'échec).

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.github/**'   # les tweaks de workflow/CI ne publient pas de release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier le secret de signature
        id: guard
        shell: bash
        env:
          KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::UPDATE_SIGNING_KEY absent — publication ignorée (ajoute le secret pour activer l'auto-update)."
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculer la version (majeur.mineur de __init__.py + numéro de run)
        if: steps.guard.outputs.has_key == 'true'
        id: ver
        shell: bash
        run: |
          # Version sémantique = le __version__ EXACT de __init__.py. Bumpez-le
          # pour publier une nouvelle release (une re-push sans bump est un no-op,
          # voir l'étape « Publier » ci-dessous).
          VER=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' src/elium/__init__.py | head -1)
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.has_key == 'true'
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.has_key == 'true'
        with:
          node-version: '22'

      - name: Installer les dépendances Python
        if: steps.guard.outputs.has_key == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Stamper la version + le code hash
        if: steps.guard.outputs.has_key == 'true'
        run: python installer/stamp_version.py "${{ steps.ver.outputs.version }}"

      - name: Tests Python (garde-fou)
        if: steps.guard.outputs.has_key == 'true'
        run: pytest tests/python -q

      - name: Builder le Web Studio
        if: steps.guard.outputs.has_key == 'true'
        working-directory: web-studio
        run: |
          npm ci
          npm run build

      - name: Builder Elium.exe (PyInstaller one-file)
        if: steps.guard.outputs.has_key == 'true'
        run: python -m PyInstaller installer/elium.spec --noconfirm --distpath installer/staging --workpath installer/build

      - name: Empaqueter web.zip
        if: steps.guard.outputs.has_key == 'true'
        shell: pwsh
        run: Compress-Archive -Path web-studio/dist/* -DestinationPath web.zip -Force

      - name: Builder le MSI (WiX 3 — best-effort)
        if: steps.guard.outputs.has_key == 'true'
        continue-on-error: true
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wix = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (-not (Test-Path $wix)) { $wix = Join-Path $env:WIX 'bin' }
          New-Item -ItemType Directory -Force -Path installer/output, installer/build | Out-Null
          & "$wix\candle.exe" -nologo -arch x64 -out installer/build/elium.wixobj installer/elium.wxs
          & "$wix\light.exe" -nologo -cultures:fr-FR -ext WixUIExtension -ext WixUtilExtension `
              -b installer -out "installer/output/Elium-${{ steps.ver.outputs.version }}-Setup.msi" `
              installer/build/elium.wixobj

      - name: Générer et signer le manifeste
        if: steps.guard.outputs.has_key == 'true'
        shell: bash
        env:
          UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        run: |
          set -e
          V="${{ steps.ver.outputs.version }}"
          MSI="installer/output/Elium-${V}-Setup.msi"
          ARGS=(--version "$V" --exe installer/staging/Elium.exe --web web.zip --out dist --notes "Elium $V")
          if [ -f "$MSI" ]; then ARGS+=(--msi "$MSI"); fi
          python installer/gen_manifest.py "${ARGS[@]}"

      - name: Publier la GitHub Release
        if: steps.guard.outputs.has_key == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          V="${{ steps.ver.outputs.version }}"
          MSI="installer/output/Elium-${V}-Setup.msi"
          ASSETS=(installer/staging/Elium.exe web.zip dist/latest.json dist/latest.json.sig)
          if [ -f "$MSI" ]; then ASSETS+=("$MSI"); fi
          if gh release view "v${V}" >/dev/null 2>&1; then
            echo "::notice::Release v${V} existe déjà — bumpez __version__ dans src/elium/__init__.py pour publier une nouvelle version."
            exit 0
          fi
          gh release create "v${V}" "${ASSETS[@]}" \
            --target "${{ github.sha }}" \
            --title "Elium ${V}" \
            --generate-notes
