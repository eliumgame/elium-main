name: Elium Release

# Déclenché quand tu pousses un tag de version (ex: git tag v4.1.0 && git push origin v4.1.0).
# Construit l'app Windows, signe le manifeste de mise à jour et publie une GitHub Release.
# Les apps déjà installées la récupèrent et se mettent à jour toutes seules.
#
# Pré-requis (une seule fois) : ajouter le secret de dépôt UPDATE_SIGNING_KEY
#   (clé privée Ed25519 en hex, produite par scripts/gen_update_keypair.py).
#   La clé publique correspondante est embarquée dans installer/updater.py.

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # nécessaire pour créer la Release et y attacher les assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Déduire la version du tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances Python
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Stamper la version + le code hash
        run: python installer/stamp_version.py "${{ steps.ver.outputs.version }}"

      - name: Tests Python (garde-fou avant publication)
        run: pytest tests/python -q

      - name: Builder le Web Studio
        working-directory: web-studio
        run: |
          npm ci
          npm run build

      - name: Builder Elium.exe (PyInstaller one-file)
        run: python -m PyInstaller installer/elium.spec --noconfirm --distpath installer/staging --workpath installer/build

      - name: Empaqueter web.zip (paquet de màj légère)
        shell: pwsh
        run: Compress-Archive -Path web-studio/dist/* -DestinationPath web.zip -Force

      - name: Builder le MSI (WiX 3 — best-effort, ne bloque pas la Release)
        id: msi
        continue-on-error: true
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wix = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (-not (Test-Path $wix)) { $wix = Join-Path $env:WIX 'bin' }
          New-Item -ItemType Directory -Force -Path installer/output, installer/build | Out-Null
          & "$wix\candle.exe" -nologo -arch x64 -out installer/build/elium.wixobj installer/elium.wxs
          & "$wix\light.exe" -nologo -cultures:fr-FR -ext WixUIExtension -ext WixUtilExtension `
              -b installer -out "installer/output/Elium-${{ steps.ver.outputs.version }}-Setup.msi" `
              installer/build/elium.wixobj

      - name: Générer et signer le manifeste (latest.json)
        shell: bash
        env:
          UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        run: |
          set -e
          MSI="installer/output/Elium-${{ steps.ver.outputs.version }}-Setup.msi"
          ARGS=(--version "${{ steps.ver.outputs.version }}"
                --exe installer/staging/Elium.exe
                --web web.zip
                --out dist
                --notes "Elium ${{ steps.ver.outputs.version }}")
          if [ -f "$MSI" ]; then ARGS+=(--msi "$MSI"); fi
          python installer/gen_manifest.py "${ARGS[@]}"

      - name: Créer la GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          MSI="installer/output/Elium-${{ steps.ver.outputs.version }}-Setup.msi"
          ASSETS=(installer/staging/Elium.exe web.zip dist/latest.json dist/latest.json.sig)
          if [ -f "$MSI" ]; then ASSETS+=("$MSI"); fi
          gh release create "$GITHUB_REF_NAME" "${ASSETS[@]}" \
            --title "Elium ${{ steps.ver.outputs.version }}" \
            --generate-notes
