<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Elium">
  <defs>
    <linearGradient id="eliumBadge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="eliumShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0b1220" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#eliumBadge)"/>

  <!-- Document -->
  <g filter="url(#eliumShadow)">
    <path d="M86 62 h62 l34 34 v98 a8 8 0 0 1 -8 8 H86 a8 8 0 0 1 -8 -8 V70 a8 8 0 0 1 8 -8 z"
          fill="#ffffff"/>
    <!-- folded corner -->
    <path d="M148 62 l34 34 h-26 a8 8 0 0 1 -8 -8 z" fill="#dbe7ff"/>
  </g>

  <!-- Text lines -->
  <rect x="98" y="112" width="84" height="10" rx="5" fill="#93b4f5"/>
  <rect x="98" y="134" width="84" height="10" rx="5" fill="#bcd0f7"/>
  <rect x="98" y="156" width="54" height="10" rx="5" fill="#bcd0f7"/>

  <!-- Seal / signature check -->
  <circle cx="170" cy="170" r="30" fill="#16a34a" stroke="#ffffff" stroke-width="6"/>
  <path d="M157 170 l9 10 l17 -20" fill="none" stroke="#ffffff" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
